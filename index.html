<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Slot Machine</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 10px;
  height: 100vh;
}

.machine {
  position: relative;
  width: 900px;
  transform: scale(0.65);
  transform-origin: top center;
}

/* 클릭 막는 요소 통과 */
.machine * {
  pointer-events: none;
}

.bg {
  position: absolute;
  top: 360px;
  left: 130px;
  width: 660px;
  height: 260px;
  z-index: 0;
  overflow: hidden;
}

.bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(25px) brightness(0.5);
  transform: scale(1.2);
}

.slot {
  position: absolute;
  top: 360px;
  left: 130px;
  width: 660px;
  height: 260px;
  overflow: hidden;
  z-index: 1;
}

.reel {
  position: absolute;
  width: 100%;
}

.reel img {
  height: 260px;
  width: auto;
  display: block;
  margin: 0 auto;
}

.frame {
  position: absolute;
  width: 100%;
  z-index: 10;
}
</style>
</head>

<body>

<div class="machine" id="machine">

  <div class="bg" id="bg"></div>

  <div class="slot">
    <div class="reel" id="reel"></div>
  </div>

  <img src="frame.png" class="frame">

</div>

<script>
const total = 68;
let isSpinning = false;
let spinAudio;
let lastSpinTime = 0;

/* 🔥 WebSocket 연결 */
const socket = new WebSocket("ws://localhost:3000");

socket.onmessage = (event) => {
  if (event.data === "spin") {
    spin();
  }
};

function setup() {
  const reel = document.getElementById("reel");

  for (let i = 1; i <= total; i++) {
    reel.innerHTML += `<img src="images/${i}.png">`;
  }
  for (let i = 1; i <= total; i++) {
    reel.innerHTML += `<img src="images/${i}.png">`;
  }
}

function spin() {
  if (isSpinning) return;

  const now = Date.now();
  if (now - lastSpinTime < 3000) return;

  lastSpinTime = now;
  isSpinning = true;

  const reel = document.getElementById("reel");
  const bg = document.getElementById("bg");
  const itemHeight = 260;

  reel.style.transition = "none";
  reel.style.transform = "translateY(0)";
  reel.offsetHeight;

  spinAudio = new Audio("sounds/spin.mp3");
  spinAudio.loop = true;
  spinAudio.volume = 0.4;
  spinAudio.play().catch(()=>{});

  const target = Math.floor(Math.random() * total);
  const index = target + 1;

  const moveY = (total + target) * itemHeight;

  reel.style.transition = "transform 2.2s ease-out";
  reel.style.transform = `translateY(-${moveY}px)`;

  setTimeout(() => {
    spinAudio.pause();

    bg.innerHTML = `<img src="images/${index}.png">`;

    const result = new Audio(`sounds/${index}.mp3`);
    result.volume = 0.8;
    result.play().catch(()=>{});

    isSpinning = false;
  }, 2200);
}

/* 클릭으로도 실행 */
document.getElementById("machine").addEventListener("click", () => {
  spin();
});

setup();
</script>

</body>
</html>
