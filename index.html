<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Slot Machine</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 10px;
  height: 100vh;
}

/* 🔥 전체 컨테이너 */
.machine {
  position: relative;
  width: 900px;
  transform: scale(0.65);
  transform-origin: top center;
  overflow: hidden; /* 🔥 핵심 (삐져나옴 방지) */
}

/* 🔥 배경 */
.bg {
  position: absolute;
  top: 338px;
  left: 120px;
  width: 660px;
  height: 260px;
  z-index: 0;
  overflow: hidden;
}

.bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(25px) brightness(0.5);
}

/* 슬롯 */
.slot {
  position: absolute;
  top: 338px;
  left: 120px;
  width: 660px;
  height: 260px;
  overflow: hidden; /* 🔥 반드시 필요 */
  z-index: 1;
}

/* 릴 */
.reel {
  position: absolute;
  width: 100%;
  left: 0;
}

/* 이미지 */
.reel img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  display: block;
}

/* 프레임 */
.frame {
  position: absolute;
  width: 100%;
  z-index: 10;
  pointer-events: none;
}

/* 클릭 영역 */
.click-area {
  position: absolute;
  top: 650px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 80px;
  cursor: pointer;
  z-index: 20;
}
</style>
</head>

<body>

<div class="machine">

  <div class="bg" id="bg"></div>

  <div class="slot">
    <div class="reel" id="reel"></div>
  </div>

  <img src="frame.png" class="frame">

  <div class="click-area" onclick="spin()"></div>

</div>

<script>
const total = 68;
let isSpinning = false;
let spinAudio;

/* 🔥 WebSocket 연결 */
const socket = new WebSocket("ws://localhost:3000");

socket.onmessage = (event) => {
  if (event.data === "spin") {
    spin();
  }
};

function setup() {
  const reel = document.getElementById("reel");

  for (let i = 1; i <= total; i++) {
    reel.innerHTML += `<img src="images/${i}.png">`;
  }
  for (let i = 1; i <= total; i++) {
    reel.innerHTML += `<img src="images/${i}.png">`;
  }
}

function spin() {
  if (isSpinning) return;
  isSpinning = true;

  const reel = document.getElementById("reel");
  const bg = document.getElementById("bg");
  const itemHeight = 260;

  reel.style.transition = "none";
  reel.style.transform = "translateY(0)";
  reel.offsetHeight;

  spinAudio = new Audio("sounds/spin.mp3");
  spinAudio.loop = true;
  spinAudio.volume = 0.4;
  spinAudio.play().catch(()=>{});

  const target = Math.floor(Math.random() * total);
  const index = target;

  const moveY = (total + target) * itemHeight;

  reel.style.transition = "transform 2.2s ease-out";
  reel.style.transform = `translateY(-${moveY}px)`;

  setTimeout(() => {
    spinAudio.pause();

    bg.innerHTML = `<img src="images/${index + 1}.png">`;

    const result = new Audio(`sounds/${index + 1}.mp3`);
    result.volume = 0.8;
    result.play().catch(()=>{});

    isSpinning = false;
  }, 2200);
}

setup();
</script>

</body>
</html>
